<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Three.js Match-3 Editor</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; }
        #ui-container {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(30, 30, 30, 0.9);
            color: #eee;
            padding: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border-radius: 8px;
            width: 220px;
            border: 1px solid #444;
            user-select: none;
            z-index: 10;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.8; }
        .btn-add { background: #2196F3; color: white; }
        .btn-random { background: #9C27B0; color: white; }
        .btn-save { background: #4CAF50; color: white; margin-top: 10px; }
        #asset-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0;
            min-height: 60px;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 4px;
        }
        .asset-thumb {
            width: 45px;
            height: 45px;
            border: 2px solid transparent;
            cursor: pointer;
            object-fit: cover;
            background: #333;
        }
    </style>
</head>
<body>
<div id="ui-container">
    <div style="display: flex; gap: 5px; margin-bottom: 5px;">
        <input type="number" id="grid-width" value="10" min="1" max="50" style="width: 50%; padding: 5px;" placeholder="Width">
        <input type="number" id="grid-height" value="6" min="1" max="50" style="width: 50%; padding: 5px;" placeholder="Height">
    </div>
    <button id="btn-resize" style="background: #FF9800; color: white; margin-bottom: 15px;">📐 Resize Grid</button>

    <button id="btn-project">📁 Connect Project Folder</button>

    <div id="folder-status" style="margin-bottom: 10px; font-size: 12px; color: #aaa;"></div>

    <button id="btn-add-photo" class="btn-add">+ Add Photo</button>

    <input type="file" id="file-input" style="display: none;" accept="image/*">

    <div id="asset-list"></div>

    <button id="btn-random" class="btn-random">🎲 Random Level</button>
    <button id="btn-clear">🗑️ Clear Level</button>
    <button id="btn-save" class="btn-save">💾 Save Level JSON</button>
</div>
<script type="module" src="src/main.js"></script>
</body>
</html>
